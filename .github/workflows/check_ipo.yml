name: Check for Open IPOs

on:
  # Runs every Monday and Thursday at 8:45 AM Nepal time (3:00 AM UTC)
  schedule:
    - cron: "0 3 * * 1,4"

  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests selenium gspread google-auth

      - name: Install Chrome and ChromeDriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Check Chrome version
        run: google-chrome --version && chromedriver --version

      - name: Check for open IPOs
        env:
          DISCORD_BOT_TOKEN:      ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:     ${{ secrets.DISCORD_CHANNEL_ID }}
          GOOGLE_SHEET_ID:        ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python check_ipo.py
