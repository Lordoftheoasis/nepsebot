name: Apply IPO

on:
  workflow_dispatch:
    inputs:
      scrip:
        description: "Stock scrip/symbol e.g. NABIL"
        required: true
      ipo_name:
        description: "Friendly IPO name shown in Discord notifications"
        required: false
        default: "Current IPO"

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt webdriver-manager gspread google-auth

      - name: Install Google Chrome
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          google-chrome --version

      - name: Apply IPO for all accounts
        env:
          DISCORD_WEBHOOK_URL:    ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_SHEET_ID:        ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          APPLIED_KITTA:          ${{ secrets.APPLIED_KITTA }}
          IPO_SCRIP:              ${{ github.event.inputs.scrip }}
          IPO_NAME:               ${{ github.event.inputs.ipo_name }}
        run: python apply_all.py
