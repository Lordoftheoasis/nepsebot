name: Apply IPO

on:
  # Triggered by the Discord bot when you click "Apply"
  # Receives scrip and ipo_name from the button interaction
  workflow_dispatch:
    inputs:
      scrip:
        description: "Stock scrip/symbol e.g. NABIL"
        required: true
      ipo_name:
        description: "Friendly IPO name shown in Discord notifications"
        required: false
        default: "Current IPO"

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Google auth dependencies
        run: pip install gspread google-auth

      - name: Install Chrome
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Install virtual display
        run: sudo apt-get install -y xvfb

      - name: Apply IPO for all accounts
        env:
          DISCORD_WEBHOOK_URL:    ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_SHEET_ID:        ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          APPLIED_KITTA:          ${{ secrets.APPLIED_KITTA }}
          IPO_SCRIP:              ${{ github.event.inputs.scrip }}
          IPO_NAME:               ${{ github.event.inputs.ipo_name }}
        run: xvfb-run python apply_all.py
